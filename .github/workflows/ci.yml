name: Basic CI

on:
  push:
  workflow_dispatch:

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}
  SMOKE_IMAGE: logicle-smoke:${{ github.sha }}

jobs:
  providers-mock:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Install dependencies (no scripts)
        run: |
          pnpm --dir logicle install --frozen-lockfile --ignore-scripts

      - name: Run mocked provider integration tests
        run: |
          pnpm --dir logicle run test:providers:mock

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long

      - name: Build production image (local)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.SMOKE_IMAGE }}
          build-args: |
            RUN_UNIT_TESTS=1
          cache-from: type=gha,scope=nextjs-build
          cache-to: type=gha,mode=max,scope=nextjs-build

      - name: Run smoke and baseline integration checks
        run: |
          set -euo pipefail
          trap 'status=$?; if [ "$status" -ne 0 ]; then echo "Smoke test failed; dumping container logs"; docker logs logicle-smoke || true; fi' EXIT

          docker run -d \
            --name logicle-smoke \
            -p 3000:3000 \
            -e APP_URL=http://localhost:3000 \
            -e DATABASE_URL=file:///data/sqlite/logicle.sqlite \
            -e FILE_STORAGE_LOCATION=/data/files \
            "${SMOKE_IMAGE}"

          echo "Waiting for app startup..."
          ready=0
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:3000/api/health >/dev/null; then
              ready=1
              break
            fi
            sleep 1
          done

          if [ "${ready}" -ne 1 ]; then
            echo "Smoke test failed: app did not become ready within 20 seconds"
            docker logs logicle-smoke || true
            exit 1
          fi

          docker exec logicle-smoke node dist-scripts/smoke.js "http://127.0.0.1:3000"

      - name: Run integration baseline checks (main/dispatch)
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          trap 'status=$?; if [ "$status" -ne 0 ]; then echo "Baseline test failed; dumping container logs"; docker logs logicle-smoke || true; fi' EXIT

          docker rm -f logicle-smoke || true

          docker run -d \
            --name logicle-smoke \
            -p 3000:3000 \
            -e APP_URL=http://localhost:3000 \
            -e DATABASE_URL=file:///data/sqlite/logicle.sqlite \
            -e FILE_STORAGE_LOCATION=/data/files \
            "${SMOKE_IMAGE}"

          ready=0
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:3000/api/health >/dev/null; then
              ready=1
              break
            fi
            sleep 1
          done

          if [ "${ready}" -ne 1 ]; then
            echo "Baseline test failed: app did not become ready within 20 seconds"
            docker logs logicle-smoke || true
            exit 1
          fi

          docker exec logicle-smoke node dist-scripts/integration-baseline.js "http://127.0.0.1:3000"

      - name: Stop smoke container
        if: always()
        run: |
          docker rm -f logicle-smoke || true

      - name: Login to GitHub Container Registry
        if: github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push production image tags (workflow dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          echo "${{ steps.meta.outputs.tags }}" | while IFS= read -r tag; do
            if [ -n "${tag}" ]; then
              docker tag "${SMOKE_IMAGE}" "${tag}"
              docker push "${tag}"
            fi
          done
