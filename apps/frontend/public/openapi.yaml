components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
            values:
              type: object
              additionalProperties: {}
          required:
            - message
            - values
          additionalProperties: false
      required:
        - error
      additionalProperties: false
    AssistantVersion:
      type: object
      properties:
        id:
          type: string
        assistantId:
          type: string
        backendId:
          type: string
        description:
          type: string
        imageId:
          anyOf:
            - type: string
            - type: "null"
        model:
          type: string
        name:
          type: string
        versionName:
          anyOf:
            - type: string
            - type: "null"
        systemPrompt:
          type: string
        temperature:
          type: number
        tokenLimit:
          type: number
        reasoning_effort:
          anyOf:
            - type: string
              enum:
                - low
                - medium
                - high
            - type: "null"
        tags:
          type: string
        prompts:
          type: string
        createdAt:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
        updatedAt:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
        current:
          type: boolean
        published:
          type: boolean
      required:
        - id
        - assistantId
        - backendId
        - description
        - imageId
        - model
        - name
        - systemPrompt
        - temperature
        - tokenLimit
        - reasoning_effort
        - tags
        - prompts
        - createdAt
        - updatedAt
        - current
        - published
      additionalProperties: false
      id: AssistantVersion
    AssistantFile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        size:
          type: number
        createdAt:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
      required:
        - id
        - name
        - type
        - size
      additionalProperties: false
      id: AssistantFile
    AssistantSharing:
      oneOf:
        - $ref: "#/components/schemas/AssistantSharingAll"
        - $ref: "#/components/schemas/AssistantSharingWorkspace"
      id: AssistantSharing
    AssistantSharingAll:
      type: object
      properties:
        type:
          type: string
          const: all
      required:
        - type
      additionalProperties: false
      id: AssistantSharingAll
    AssistantSharingWorkspace:
      type: object
      properties:
        type:
          type: string
          const: workspace
        workspaceId:
          type: string
        workspaceName:
          type: string
      required:
        - type
        - workspaceId
        - workspaceName
      additionalProperties: false
      id: AssistantSharingWorkspace
    AssistantDraft:
      type: object
      properties:
        id:
          type: string
        assistantId:
          type: string
        backendId:
          type: string
        description:
          type: string
        model:
          type: string
        name:
          type: string
        versionName:
          anyOf:
            - type: string
            - type: "null"
        systemPrompt:
          type: string
        temperature:
          type: number
        tokenLimit:
          type: number
        reasoning_effort:
          anyOf:
            - type: string
              enum:
                - low
                - medium
                - high
            - type: "null"
        createdAt:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
        updatedAt:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
        owner:
          type: string
        tools:
          type: array
          items:
