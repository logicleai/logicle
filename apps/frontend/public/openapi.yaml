openapi: 3.0.3
info:
  title: "@logicleai/logicle"
  version: 0.26-snapshot
paths:
  /api/analytics/activity/byassistant:
    get:
      summary: Get activity by assistant
      description: Fetch assistant activity aggregates for a given period.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    assistantId:
                      anyOf:
                        - type: string
                        - type: "null"
                    name:
                      anyOf:
                        - type: string
                        - type: "null"
                    tokens:
                      type: number
                    messages:
                      type: number
                  required:
                    - assistantId
                    - name
                    - tokens
                    - messages
                  additionalProperties: false
        "400":
          $ref: "#/components/responses/Error"
      security:
        - bearerAuth: []
  /api/analytics/activity/byuser:
    get:
      summary: Get activity by user
      description: Fetch user activity aggregates for a given period.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    userId:
                      anyOf:
                        - type: string
                        - type: "null"
                    name:
                      anyOf:
                        - type: string
                        - type: "null"
                    tokens:
                      type: number
                    messages:
                      type: number
                  required:
                    - userId
                    - name
                    - tokens
                    - messages
                  additionalProperties: false
        "400":
          $ref: "#/components/responses/Error"
      security:
        - bearerAuth: []
  /api/analytics/activity:
    get:
      summary: Get activity summary
      description: Fetch activity summary for a given period.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: number
                  messages:
                    type: number
                  conversations:
                    type: number
                required:
                  - users
                  - messages
                  - conversations
                additionalProperties: false
        "400":
          $ref: "#/components/responses/Error"
      security:
        - bearerAuth: []
  /api/analytics/usage/byassistant:
    get:
      summary: Get usage by assistant
      description: Fetch usage time-series broken down by assistant for a given period.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: string
                    enum:
                      - last_week
                      - last_month
                      - last_year
                      - custom
                  granularity:
                    type: string
                    enum:
                      - hour
                      - day
                      - week
                      - month
                  from:
                    type: string
                  to:
                    type: string
                  rows:
                    type: array
                    items:
                      type: object
                      properties:
                        start:
                          type: string
                        end:
                          type: string
                        id:
                          anyOf:
                            - type: string
                            - type: "null"
                        name:
                          anyOf:
                            - type: string
                            - type: "null"
                        tokens:
                          type: number
                        messages:
                          type: number
                      required:
                        - start
                        - end
                        - id
                        - name
                        - tokens
                        - messages
                      additionalProperties: false
                required:
                  - period
                  - granularity
                  - from
                  - to
                  - rows
                additionalProperties: false
        "400":
          $ref: "#/components/responses/Error"
      security:
        - bearerAuth: []
  /api/analytics/usage/byuser:
    get:
      summary: Get usage by user
      description: Fetch usage time-series broken down by user for a given period.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: string
                    enum:
                      - last_week
                      - last_month
                      - last_year
                      - custom
                  granularity:
                    type: string
                    enum:
                      - hour
                      - day
                      - week
                      - month
                  from:
                    type: string
                  to:
                    type: string
                  rows:
                    type: array
                    items:
                      type: object
                      properties:
                        start:
                          type: string
                        end:
                          type: string
                        id:
                          anyOf:
                            - type: string
                            - type: "null"
                        name:
                          anyOf:
                            - type: string
                            - type: "null"
                        tokens:
                          type: number
                        messages:
                          type: number
                      required:
                        - start
                        - end
                        - id
                        - name
                        - tokens
                        - messages
                      additionalProperties: false
                required:
                  - period
                  - granularity
                  - from
                  - to
                  - rows
                additionalProperties: false
        "400":
          $ref: "#/components/responses/Error"
      security:
        - bearerAuth: []
  /api/analytics/usage:
    get:
      summary: Get usage
      description: Fetch usage aggregates for a given period.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: string
                    enum:
                      - last_week
                      - last_month
                      - last_year
                      - custom
                  granularity:
                    type: string
                    enum:
                      - hour
                      - day
                      - week
                      - month
                  from:
                    type: string
                  to:
                    type: string
                  buckets:
                    type: array
                    items:
                      type: object
                      properties:
                        start:
                          type: string
                        end:
                          type: string
                        tokens:
                          type: number
                        messages:
                          type: number
                      required:
                        - start
                        - end
                        - tokens
                        - messages
                      additionalProperties: false
                required:
                  - period
                  - granularity
                  - from
                  - to
                  - buckets
                additionalProperties: false
        "400":
          $ref: "#/components/responses/Error"
      security:
        - bearerAuth: []
  /api/assistants/{assistantId}/clone:
    post:
      summary: Clone assistant
      description: Clone a published assistant.
      responses:
        "201":
          description: Response
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
      parameters:
        - name: assistantId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
  /api/assistants/{assistantId}/history:
    get:
      summary: List assistant versions
      description: Fetch version history for an assistant.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssistantVersion"
      parameters:
        - name: assistantId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
  /api/assistants/{assistantId}/publish:
    post:
      summary: Publish assistant
      description: Publish an assistant draft.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema: {}
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
      parameters:
        - name: assistantId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                versionName:
                  anyOf:
                    - type: string
                      maxLength: 120
                    - type: "null"
              additionalProperties: false
  /api/assistants/{assistantId}/reset-draft:
    post:
      summary: Reset assistant draft
      description: Reset draft to the last published version.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantDraft"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
      parameters:
        - name: assistantId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
  /api/assistants/{assistantId}:
    get:
      summary: Get assistant draft
      description: Fetch assistant draft details.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantDraft"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
      parameters:
        - name: assistantId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
    delete:
      summary: Delete assistant
      description: Delete an assistant.
      responses:
        "204":
          description: Response
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
      parameters:
        - name: assistantId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
    patch:
      summary: Update assistant draft
      description: Update assistant draft data.
      responses:
        "204":
          description: Response
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
      parameters:
        - name: assistantId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateableAssistantDraft"
  /api/assistants/{assistantId}/sharing:
    post:
      summary: Update assistant sharing
      description: Update sharing configuration for an assistant.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssistantSharing"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
      parameters:
        - name: assistantId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/AssistantSharing"
  /api/assistants/drafts/{assistantVersionId}:
    get:
      summary: Get assistant draft by version
      description: Fetch draft for a specific assistant version.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantDraft"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
      parameters:
        - name: assistantVersionId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
    patch:
      summary: Update assistant draft version metadata
      description: Update metadata for a specific assistant version.
      responses:
        "204":
          description: Response
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
      parameters:
        - name: assistantVersionId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                versionName:
                  anyOf:
                    - type: string
                      maxLength: 120
                    - type: "null"
              required:
                - versionName
              additionalProperties: false
  /api/assistants/evaluate:
    post:
      summary: Evaluate assistant
      description: Evaluate an assistant draft with a message list.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema: {}
        "400":
          $ref: "#/components/responses/Error"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateAssistantRequest"
  /api/assistants:
    get:
      summary: List assistants
      description: List all assistants.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema: {}
      security:
        - bearerAuth: []
    post:
      summary: Create assistant
      description: Create a new assistant draft.
      responses:
        "201":
          description: Response
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InsertableAssistantDraft"
  /api/assistants/tags:
    get:
      summary: List assistant tags
      description: List available assistant tag suggestions for the current user.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
      security:
        - bearerAuth: []
  /api/assistants/tokens/estimate:
    post:
      summary: Estimate assistant draft input tokens
      description: Estimate non-cumulative input tokens for an assistant draft and
        message list.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantTokenEstimateResponse"
        "400":
          $ref: "#/components/responses/Error"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateAssistantRequest"
  /api/auth/join:
    post:
      summary: Signup
      description: Create a new user account.
      responses:
        "201":
          description: Response
        "400":
          $ref: "#/components/responses/Error"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinRequest"
  /api/auth/login:
    post:
      summary: Login
      description: Authenticate with email and password.
      responses:
        "204":
          description: Response
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
  /api/auth/logout:
    post:
      summary: Logout
      description: Clear the session cookie.
      responses:
        "204":
          description: Response
  /api/auth/refresh:
    post:
      summary: Refresh Session
      description: Refresh session cookie.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  expiresAt:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                required:
                  - expiresAt
                additionalProperties: false
      security:
        - bearerAuth: []
  /api/auth/saml/login:
    get:
      summary: SAML login redirect
      description: Initiate login against an IdP connection.
      responses:
        "302":
          description: Response
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/auth/sessions/{sessionId}:
    delete:
      summary: Delete session
      description: Delete an active session owned by the current user.
      responses:
        "204":
          description: Response
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
  /api/auth/sessions:
    get:
      summary: List my sessions
      description: Fetch active sessions for the current user.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionSummary"
      security:
        - bearerAuth: []
  /api/backends/{backendId}/models:
    get:
      summary: List models for backend
      description: List available models for a backend.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    providerType:
                      type: string
                  required:
                    - id
                    - name
                    - providerType
                  additionalProperties: false
        "404":
          $ref: "#/components/responses/Error"
      parameters:
        - name: backendId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
  /api/backends/{backendId}:
    get:
      summary: Get backend
      description: Fetch a backend by id.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Backend"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
      parameters:
        - name: backendId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
    delete:
      summary: Delete backend
      description: Delete a backend configuration.
      responses:
        "204":
          description: Response
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
      parameters:
        - name: backendId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
    patch:
      summary: Update backend
      description: Update an existing backend configuration.
      responses:
        "204":
          description: Response
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
      parameters:
        - name: backendId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateableBackend"
  /api/backends/models:
    get:
      summary: List backends with models
      description: List backends and their models.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    backendId:
                      type: string
                    backendName:
                      type: string
                    models:
                      type: array
                      items:
                        $ref: "#/components/schemas/LlmModel"
                  required:
                    - backendId
                    - backendName
                    - models
                  additionalProperties: false
      security:
        - bearerAuth: []
  /api/backends:
    get:
      summary: List backends
      description: List available backends (without secrets).
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Backend"
      security:
        - bearerAuth: []
    post:
      summary: Create backend
      description: Create a new backend configuration.
      responses:
        "201":
          description: Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Backend"
        "403":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InsertableBackend"
  /api/chat:
    post:
      summary: Chat
      description: Send a message to a conversation and stream assistant response.
      responses:
        "200":
          description: Response
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
  /api/chat/runs/{runId}/events:
    get:
      summary: Stream chat run events
      description: Replay and stream live events for an active chat run.
      responses:
        "200":
          description: Response
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
  /api/chat/runs/{runId}/stop:
    post:
      summary: Stop chat run
      description: Request stop for an active chat run.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatRun"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
  /api/chat/runs:
    post:
      summary: Create chat run
      description: Start a server-side chat run for a conversation.
      responses:
        "201":
          description: Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatRun"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
  /api/conversations/{conversationId}/active-run:
    get:
      summary: Get active chat run
      description: Fetch the active in-memory chat run for a conversation.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveChatRunResponse"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
  /api/conversations/{conversationId}/export/docx:
    post:
      summary: Export conversation markdown to DOCX
      description: Render markdown into a DOCX document for a conversation owned by
        the session user.
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema: {}
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationDocxExportRequest"
  /api/conversations/{conversationId}/feedbacks:
    get:
      summary: List conversation feedbacks
      description: Get all message feedbacks for a conversation (owned by the session user).
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    messageId:
                      type: string
                    feedback:
                      type: string
                      enum:
                        - like
                        - dislike
                    comment:
                      anyOf:
                        - type: string
                        - type: "null"
                  required:
                    - messageId
                    - feedback
                    - comment
                  additionalProperties: false
        "403":
          $ref: "#/components/responses/Error"
        "404":
